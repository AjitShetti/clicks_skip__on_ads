<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube Ad Skipper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    .header {
      background: #ff0000;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header svg {
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .header-text p {
      font-size: 10px;
      opacity: 0.85;
      margin-top: 1px;
    }

    .body {
      padding: 16px;
    }

    .status-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      margin-bottom: 12px;
    }

    .count {
      font-size: 36px;
      font-weight: 800;
      color: #ff4444;
      line-height: 1;
    }

    .count-label {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #1a2e1a;
      border: 1px solid #2a4a2a;
      color: #4caf50;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 20px;
      margin-top: 10px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .info {
      font-size: 11px;
      color: #555;
      text-align: center;
      line-height: 1.5;
    }

    .footer {
      border-top: 1px solid #1e1e1e;
      padding: 10px 16px;
      font-size: 10px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <!-- YouTube-style play icon -->
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="white" fill-opacity="0.15"/>
      <polygon points="11,9 21,14 11,19" fill="white"/>
    </svg>
    <div class="header-text">
      <h1>YouTube Ad Skipper</h1>
      <p>Automatically skips ads for you</p>
    </div>
  </div>

  <div class="body">
    <div class="status-card">
      <div class="count" id="count">0</div>
      <div class="count-label">Ads Skipped This Session</div>
      <div class="pill">
        <div class="dot"></div>
        Active &amp; Running
      </div>
    </div>

    <p class="info">
      The extension is watching for skip buttons on YouTube and clicking them instantly.
    </p>
  </div>

  <div class="footer">Works on youtube.com • Runs automatically</div>

  <script src="popup.js"></script>
</body>
</html>
